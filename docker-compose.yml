services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: garment
      POSTGRES_PASSWORD: garment
      POSTGRES_DB: garment_deals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garment -d garment_deals"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://garment:garment@postgres:5432/garment_deals
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 8

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://garment:garment@postgres:5432/garment_deals
      REDIS_URL: redis://redis:6379/0
      USE_CELERY: "true"
      AUTO_CREATE_TABLES: "false"
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:

